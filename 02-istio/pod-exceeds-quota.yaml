# This Pod asks for more CPU than resourcequota.yaml allows → admission failure.
apiVersion: v1
kind: Pod
metadata:
  name: demo-pod-too-big
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "2"
          memory: 128Mi
